events {
  worker_connections 1024;
}

http {
  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api:10m  rate=300r/m;

  # Upstream definitions for all services
  upstream identity_service       { server identity-service:3001; }
  upstream wallet_service         { server wallet-service:3002; }
  upstream compliance_service     { server compliance-service:3003; }
  upstream trade_service          { server trade-service:3004; }
  upstream fiat_service           { server fiat-service:3005; }
  upstream notification_service   { server notification-service:3006; }
  upstream websocket_service_http { server websocket-service:3007; }
  upstream kyb_service            { server kyb-service:3008; }
  upstream compliance_engine      { server compliance-engine:3009; }
  upstream analytics_service      { server analytics-service:3010; }
  upstream auth_service           { server auth-service:3011; }
  upstream billing_service        { server billing-service:3012; }
  upstream developer_portal       { server developer-portal:3013; }
  upstream trading_service        { server trading-service:3014; }
  upstream scheduler_service      { server scheduler-service:3015; }
  upstream webhook_service        { server webhook-service:3016; }
  upstream business_model         { server business-model:3017; }
  upstream ai_service             { server ai-service:3018; }
  upstream websocket_service_ws   { server websocket-service:3099; }

  server {
    listen 80;
    server_name _;
    return 302 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/ssl/certs/aegis.crt;
    ssl_certificate_key /etc/ssl/private/aegis.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 1. Identity & KYB
    location /api/kyb {
      limit_req zone=api burst=20;
      proxy_pass http://kyb_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /api/identity {
      limit_req zone=api burst=20;
      proxy_pass http://identity_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. Auth Service
    location /api/auth {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://auth_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. Wallets & Transfers
    location /api/wallets {
      limit_req zone=api burst=50;
      proxy_pass http://wallet_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/transfers {
      limit_req zone=api burst=50;
      proxy_pass http://wallet_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # 4. Compliance & AI
    location /api/compliance {
      limit_req zone=api burst=30;
      proxy_pass http://compliance_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/compliance-engine {
      limit_req zone=api burst=30;
      proxy_pass http://compliance_engine;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/ai {
      limit_req zone=api burst=30;
      proxy_pass http://ai_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # 5. Trade & Trading
    location /api/trade {
      limit_req zone=api burst=30;
      proxy_pass http://trade_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      client_max_body_size 25M;
    }
    location /api/trading {
      limit_req zone=api burst=30;
      proxy_pass http://trading_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # 6. Fiat
    location /api/fiat {
      limit_req zone=api burst=20;
      proxy_pass http://fiat_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # 7. Notification & Webhook
    location /api/notifications {
      limit_req zone=api burst=50;
      proxy_pass http://notification_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/webhooks {
      limit_req zone=api burst=50;
      proxy_pass http://webhook_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # 8. Scheduler
    location /api/scheduler {
      limit_req zone=api burst=20;
      proxy_pass http://scheduler_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # 9. Analytics & Billing
    location /api/analytics {
      limit_req zone=api burst=30;
      proxy_pass http://analytics_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/billing {
      limit_req zone=api burst=30;
      proxy_pass http://billing_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # 10. Developer Portal & Business Model
    location /api/developer {
      limit_req zone=api burst=30;
      proxy_pass http://developer_portal;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/business-model {
      limit_req zone=api burst=30;
      proxy_pass http://business_model;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # 11. WebSocket Http
    location /api/ws-info {
      limit_req zone=api burst=30;
      proxy_pass http://websocket_service_http;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # 12. WebSocket Upgrades
    location /ws/ {
      proxy_pass http://websocket_service_ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
    }

    # Health check
    location /health {
      return 200 '{"status":"ok","gateway":"aegisledger"}';
      add_header Content-Type application/json;
    }
  }
}
